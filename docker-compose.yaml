services:
  rooms_db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: rooms_password
      POSTGRES_DB: focus_rooms_db
    ports:
      - "5434:5432"
    volumes:
      - rooms_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d focus_rooms_db"]
      interval: 5s
      timeout: 5s
      retries: 5
  rooms_ms:
    build:
      context: .
    ports:
      - "8004:8004"
    environment:
      - PORT=8004
      - DATABASE_URL=postgresql+asyncpg://user:rooms_password@rooms_db:5432/focus_rooms_db
      - SECRET_KEY=clave_super_secreta
    depends_on:
      rooms_db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
volumes:
  rooms_data: